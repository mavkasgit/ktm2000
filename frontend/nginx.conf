map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_cf_visitor $cf_visitor_proto {
    default "";
    ~*\"scheme\":\"https\" https;
    ~*\"scheme\":\"http\" http;
}

map $http_x_forwarded_proto $xfp_proto {
    default "";
    ~*^https https;
    ~*^http http;
}

map $http_host $host_proto_override {
    default "";
    ~*\.trycloudflare\.com(?::\d+)?$ https;
    ~*\.loca\.lt(?::\d+)?$ https;
    ~*\.localtunnel\.me(?::\d+)?$ https;
}

map "$host_proto_override:$cf_visitor_proto:$xfp_proto" $origin_proto {
    default $scheme;
    ~^https: https;
    ~^http: http;
    ~^:https: https;
    ~^:http: http;
    ~^::https https;
    ~^::http http;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    client_max_body_size 2g;
    client_body_timeout 300s;

    # Frontend SPA (static files)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static files served by backend
    location ^~ /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
