name: Build, Test and Push Docker Images

on:
  push:
    branches:
      - main
      - master
      - temp-ci-setup

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: mavkasgit

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Test Database
        run: |
          docker compose --env-file .env.test -f infra/compose/docker-compose.test.yml up -d postgres

      - name: Wait for Postgres to be ready
        run: |
          until docker exec ktm2000-postgres-test pg_isready -U ktm2000_user -d ktm2000_test; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          echo "PostgreSQL is ready!"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest pytest-asyncio httpx

      - name: Run Backend Tests
        run: |
          cd backend
          pytest
        env:
          ENV_FILE: ../.env.test
          TEST_DATABASE_URL: postgresql+asyncpg://ktm2000_user:ktm2000_pass_test@localhost:5212/ktm2000_test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm run test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Сборка и отправка Backend
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/ktm2000-backend:latest

      # Сборка и отправка Frontend
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/ktm2000-frontend:latest
