map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_cf_visitor $cf_visitor_proto {
    default "";
    ~*\"scheme\":\"https\" https;
    ~*\"scheme\":\"http\" http;
}

map $http_x_forwarded_proto $xfp_proto {
    default "";
    ~*^https https;
    ~*^http http;
}

map $http_host $host_proto_override {
    default "";
    ~*\.trycloudflare\.com(?::\d+)?$ https;
    ~*\.loca\.lt(?::\d+)?$ https;
    ~*\.localtunnel\.me(?::\d+)?$ https;
}

map "$host_proto_override:$cf_visitor_proto:$xfp_proto" $origin_proto {
    default $scheme;
    ~^https: https;
    ~^http: http;
    ~^:https: https;
    ~^:http: http;
    ~^::https https;
    ~^::http http;
}

server {
    listen 100;
    server_name localhost;
    client_max_body_size 2g;
    client_body_timeout 300s;

    # --- Backend API ---
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- Frontend SPA ---
    location / {
        proxy_pass http://frontend:100;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
    }
}
