map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_cf_visitor $cf_visitor_proto {
    default "";
    ~*\"scheme\":\"https\" https;
    ~*\"scheme\":\"http\" http;
}

map $http_x_forwarded_proto $xfp_proto {
    default "";
    ~*^https https;
    ~*^http http;
}

map $http_host $host_proto_override {
    default "";
    ~*\.trycloudflare\.com(?::\d+)?$ https;
    ~*\.loca\.lt(?::\d+)?$ https;
    ~*\.localtunnel\.me(?::\d+)?$ https;
}

map "$host_proto_override:$cf_visitor_proto:$xfp_proto" $origin_proto {
    default $scheme;
    ~^https: https;
    ~^http: http;
    ~^:https: https;
    ~^:http: http;
    ~^::https https;
    ~^::http http;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 2g;
    client_body_timeout 300s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Frontend SPA — proxy to frontend container
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
    }

    # Backend API
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Backend static files
    location /static/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
