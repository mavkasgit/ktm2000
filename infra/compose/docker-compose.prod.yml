name: ktm2000-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: ktm2000-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ktm2000_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ktm2000_prod_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ktm2000_prod}
    expose:
      - "5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-../../data/postgres-prod}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: ghcr.io/mavkasgit/ktm2000-backend:latest
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ktm2000-backend-prod
    env_file:
      - ../../.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ktm2000_user}:${POSTGRES_PASSWORD:-ktm2000_prod_pass}@postgres:5432/${POSTGRES_DB:-ktm2000_prod}
      ENV: prod
      SECRET_KEY: ${SECRET_KEY:-ktm2000-prod-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8082}
      PRODUCT_PHOTO_DIR: /app/storage/products
      IMPORT_STORAGE_DIR: /app/storage/imports
    expose:
      - "8000"
    volumes:
      - ${STORAGE_PATH:-../../storage}:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "until python -c 'import socket; s=socket.create_connection((\"postgres\", 5432), 3); s.close()'; do sleep 2; done &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/mavkasgit/ktm2000-frontend:latest
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: ktm2000-frontend-prod
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: ktm2000-nginx-prod
    ports:
      - "8082:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - shared_gateway
    depends_on:
      - frontend
      - backend
    restart: always

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: ktm2000-cloudflared-prod
    network_mode: "service:nginx"
    depends_on:
      - nginx
    command: >
      tunnel --url http://127.0.0.1:80 --protocol http2 --no-autoupdate
    restart: unless-stopped

networks:
  shared_gateway:
    external: true
