name: ktm2000-dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: ktm2000-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ktm2000_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ktm2000_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ktm2000_dev}
    ports:
      - "${DEV_POSTGRES_PORT:-5202}:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-../../data/postgres-dev}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
