name: ktm2000-test

services:
  postgres:
    image: postgres:15-alpine
    container_name: ktm2000-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ktm2000_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ktm2000_pass_test}
      POSTGRES_DB: ${POSTGRES_DB:-ktm2000_test}
    ports:
      - "${POSTGRES_PORT:-5212}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ktm2000-backend-test
    env_file:
      - ../../.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ktm2000_user}:${POSTGRES_PASSWORD:-ktm2000_pass_test}@postgres:5432/${POSTGRES_DB:-ktm2000_test}
      ENV: test
      CORS_ORIGINS: "*"
    expose:
      - "8000"
    volumes:
      - storage_test_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: ktm2000-frontend-test
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ktm2000-nginx-test
    ports:
      - "${EXTERNAL_PORT:-8100}:100"
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_test_data:
  storage_test_data:
