name: factoryflow-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: factoryflow-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factoryflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factoryflow_pass_prod}
      POSTGRES_DB: ${POSTGRES_DB:-factoryflow_prod}
    ports:
      - "${PROD_POSTGRES_BIND:-127.0.0.1}:${PROD_POSTGRES_PORT:-5222}:5432"
    volumes:
      - ${PROD_POSTGRES_DATA_PATH:-../data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: factoryflow-backend-prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-factoryflow_user}:${POSTGRES_PASSWORD:-factoryflow_pass_prod}@postgres:5432/${POSTGRES_DB:-factoryflow_prod}
      ENV: prod
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      PRODUCT_PHOTO_DIR: /app/storage/products
      IMPORT_STORAGE_DIR: /app/storage/imports
    ports:
      - "${PROD_BACKEND_BIND:-127.0.0.1}:${PROD_BACKEND_PORT:-5201}:8000"
    volumes:
      - ${PROD_STORAGE_PATH:-../storage}:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: factoryflow-frontend-prod
    ports:
      - "${PROD_FRONTEND_BIND:-127.0.0.1}:${PROD_FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: always

  localtunnel:
    profiles: ["tunnel"]
    image: node:20-alpine
    container_name: ktm-localtunnel-prod
    network_mode: "service:frontend"
    depends_on:
      - frontend
    command: >
      sh -c "echo 'Waiting for frontend...' &&
             until wget -q -O /dev/null http://127.0.0.1:80; do sleep 2; done &&
             echo 'Starting localtunnel...' &&
             npx --yes localtunnel --port 80 --subdomain ${LOCALTUNNEL_SUBDOMAIN:-ktm-prod-7q2k9m4x} 2>&1"
    restart: always




