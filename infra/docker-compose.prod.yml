name: ktm2000-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: ktm2000-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ktm2000_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ktm2000_prod}
    expose:
      - "5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-../data/postgres-prod}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ktm2000-backend-prod
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ktm2000_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ktm2000_prod}
      ENV: prod
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      PRODUCT_PHOTO_DIR: /app/storage/products
      IMPORT_STORAGE_DIR: /app/storage/imports
    expose:
      - "8000"
    volumes:
      - ${STORAGE_PATH:-../storage}:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ktm2000-frontend-prod
    expose:
      - "3000"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: ktm2000-nginx-prod
    ports:
      - "${EXTERNAL_PORT:-100}:100"
    volumes:
      - ../infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: ktm2000-cloudflared-prod
    network_mode: "service:nginx"
    depends_on:
      - nginx
    command: >
      tunnel --url http://127.0.0.1:100 --protocol http2 --no-autoupdate
    restart: unless-stopped
